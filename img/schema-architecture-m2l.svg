<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050">
  <defs>
    <style>
      .title{font-family:Segoe UI,Arial,sans-serif;font-weight:800;fill:#0f172a}
      .subtitle{font-family:Segoe UI,Arial,sans-serif;font-weight:700;fill:#1e40af}
      .text{font-family:Segoe UI,Arial,sans-serif;fill:#334155;font-size:20px}
      .small{font-family:Segoe UI,Arial,sans-serif;fill:#475569;font-size:17px}
      .tiny{font-family:Segoe UI,Arial,sans-serif;fill:#64748b;font-size:15px}
      .code{font-family:Consolas,monospace;fill:#0f172a;font-size:18px}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:22;filter:url(#shadow)}
      .blue{stroke:#2563eb;stroke-width:3}
      .green{stroke:#16a34a;stroke-width:3}
      .orange{stroke:#f97316;stroke-width:3}
      .purple{stroke:#7c3aed;stroke-width:3}
      .yellow{stroke:#eab308;stroke-width:3}
      .dark{stroke:#1e293b;stroke-width:3}
      .line{stroke:#334155;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
      .dash{stroke:#334155;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:12 10}
      .thin{stroke:#94a3b8;stroke-width:2;fill:none;stroke-linecap:round}
      .chip{fill:#e0f2fe;stroke:#bfdbfe;stroke-width:1;rx:16}
      .icon{font-family:Segoe UI Emoji,Apple Color Emoji,Noto Color Emoji,sans-serif;font-size:42px}
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
  </defs>

  <rect width="1600" height="1050" fill="#f8fafc"/>
  <text x="800" y="48" text-anchor="middle" class="title" font-size="36">Architecture réseau – Maison des Ligues de Lorraine (M2L)</text>
  <text x="800" y="82" text-anchor="middle" class="subtitle" font-size="22">BTS SIO SISR – Environnement E6 / Portfolio E5</text>

  <!-- Top physical/common network -->
  <rect x="230" y="115" width="1300" height="190" class="box blue"/>
  <text x="880" y="150" text-anchor="middle" class="subtitle" font-size="22">Infrastructure physique – réseau commun partagé 10.0.10.0/24</text>

  <rect x="35" y="160" width="160" height="90" rx="45" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="115" y="198" text-anchor="middle" class="text" font-weight="700">Réseau école</text>
  <text x="115" y="226" text-anchor="middle" class="code">10.74.0.0/22</text>
  <path d="M195 205 H230" class="line"/>

  <g transform="translate(255,178)">
    <text x="0" y="0" class="icon">🔀</text><text x="38" y="14" class="small" font-weight="700">Routeur Cisco</text><text x="38" y="40" class="code">10.0.10.1</text>
  </g>
  <g transform="translate(410,178)">
    <text x="0" y="0" class="icon">🖥️</text><text x="38" y="14" class="small" font-weight="700">Proxmox VE</text><text x="38" y="40" class="code">10.0.10.2</text>
  </g>
  <g transform="translate(565,178)">
    <text x="0" y="0" class="icon">🔁</text><text x="38" y="14" class="small" font-weight="700">Switch L3</text><text x="38" y="40" class="code">10.0.10.3</text>
  </g>
  <g transform="translate(720,170)">
    <text x="0" y="0" class="icon">🧱</text><text x="38" y="14" class="small" font-weight="700">OPNsense</text><text x="38" y="38" class="tiny">mon groupe</text><text x="38" y="64" class="code">10.0.10.4</text>
  </g>
  <g transform="translate(890,170)">
    <text x="0" y="0" class="icon">🧱</text><text x="38" y="14" class="small" font-weight="700">OPNsense</text><text x="38" y="38" class="tiny">autre groupe</text><text x="38" y="64" class="code">10.0.10.5</text>
  </g>
  <g transform="translate(1065,170)">
    <text x="0" y="0" class="icon">🔁</text><text x="38" y="14" class="small" font-weight="700">Switch dist.</text><text x="38" y="38" class="tiny">autre groupe</text><text x="38" y="64" class="code">10.0.10.7</text>
  </g>
  <g transform="translate(1245,170)">
    <text x="0" y="0" class="icon">🔁</text><text x="38" y="14" class="small" font-weight="700">Switch dist.</text><text x="38" y="38" class="tiny">mon groupe</text><text x="38" y="64" class="code">10.0.10.8</text>
  </g>
  <g transform="translate(1410,178)">
    <text x="0" y="0" class="icon">💾</text><text x="38" y="14" class="small" font-weight="700">PBS</text><text x="38" y="40" class="code">10.0.10.10</text>
  </g>
  <path d="M365 205 H405 M520 205 H560 M675 205 H715 M835 205 H885 M1005 205 H1060 M1185 205 H1240 M1360 205 H1405" class="thin"/>

  <!-- Firewall and switch -->
  <rect x="250" y="325" width="1265" height="660" class="box green"/>
  <text x="285" y="365" class="subtitle" font-size="22" fill="#166534">Architecture logique du groupe – VLANs internes 10.20.VLAN.0/24</text>

  <rect x="670" y="405" width="210" height="105" rx="18" fill="#fff7ed" stroke="#f97316" stroke-width="3"/>
  <text x="775" y="448" text-anchor="middle" class="icon">🧱</text>
  <text x="775" y="482" text-anchor="middle" class="text" font-weight="800">OPNsense</text>
  <text x="775" y="506" text-anchor="middle" class="code">WAN 10.0.10.4</text>
  <text x="775" y="530" text-anchor="middle" class="tiny">Gateway .1 sur chaque VLAN</text>

  <rect x="703" y="575" width="145" height="70" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="775" y="605" text-anchor="middle" class="text" font-weight="800">Switch dist.</text>
  <text x="775" y="630" text-anchor="middle" class="code">10.0.10.8</text>
  <path d="M775 510 V575" class="dash" marker-end="url(#arrow)"/>
  <text x="805" y="555" class="tiny">trunk 802.1Q</text>

  <!-- VLAN boxes -->
  <rect x="285" y="680" width="245" height="245" class="box green"/>
  <text x="407" y="715" text-anchor="middle" class="text" font-weight="800" fill="#15803d">VLAN 210 – Admin</text>
  <text x="407" y="740" text-anchor="middle" class="code">10.20.210.0/24</text>
  <text x="305" y="778" class="small">• AD / DNS / DHCP</text>
  <text x="305" y="806" class="small">• GLPI + MariaDB</text>
  <text x="305" y="834" class="small">• Graylog, Zabbix, Wazuh</text>
  <text x="305" y="862" class="small">• Intranet &amp; admin équipements</text>
  <text x="305" y="890" class="small">• Borne WiFi en gestion</text>
  <text x="305" y="915" class="code">Gateway 10.20.210.1</text>

  <rect x="565" y="680" width="225" height="245" class="box orange"/>
  <text x="677" y="715" text-anchor="middle" class="text" font-weight="800" fill="#ea580c">VLAN 220 – DMZ</text>
  <text x="677" y="740" text-anchor="middle" class="code">10.20.220.0/24</text>
  <text x="585" y="778" class="small">• HAProxy</text>
  <text x="585" y="806" class="small">• Serveur Web DMZ</text>
  <text x="585" y="834" class="small">• Accès WAN 80/443</text>
  <text x="585" y="862" class="small">• LAN interdit par défaut</text>
  <text x="585" y="915" class="code">Gateway 10.20.220.1</text>

  <rect x="825" y="680" width="205" height="245" class="box blue"/>
  <text x="927" y="715" text-anchor="middle" class="text" font-weight="800" fill="#1d4ed8">VLAN 230 – WiFi</text>
  <text x="927" y="740" text-anchor="middle" class="code">10.20.230.0/24</text>
  <text x="845" y="778" class="small">• SSID interne</text>
  <text x="845" y="806" class="small">• Clients WiFi M2L</text>
  <text x="845" y="834" class="small">• Services autorisés</text>
  <text x="845" y="915" class="code">Gateway 10.20.230.1</text>

  <rect x="1065" y="680" width="205" height="245" class="box purple"/>
  <text x="1167" y="715" text-anchor="middle" class="text" font-weight="800" fill="#7c3aed">VLAN 240 – Invité</text>
  <text x="1167" y="740" text-anchor="middle" class="code">10.20.240.0/24</text>
  <text x="1085" y="778" class="small">• SSID invité</text>
  <text x="1085" y="806" class="small">• Internet uniquement</text>
  <text x="1085" y="834" class="small">• LAN bloqué</text>
  <text x="1085" y="915" class="code">Gateway 10.20.240.1</text>

  <rect x="1305" y="680" width="175" height="245" class="box yellow"/>
  <text x="1392" y="715" text-anchor="middle" class="text" font-weight="800" fill="#a16207">VLAN 250 – Users</text>
  <text x="1392" y="740" text-anchor="middle" class="code">10.20.250.0/24</text>
  <text x="1325" y="778" class="small">• 3 clients Windows</text>
  <text x="1325" y="806" class="small">• 1 client Linux</text>
  <text x="1325" y="834" class="small">• Domaine AD</text>
  <text x="1325" y="915" class="code">Gateway 10.20.250.1</text>

  <path d="M775 645 C775 665 407 660 407 680" class="dash"/>
  <path d="M775 645 C775 665 677 660 677 680" class="dash"/>
  <path d="M775 645 C775 665 927 660 927 680" class="dash"/>
  <path d="M775 645 C775 665 1167 660 1167 680" class="dash"/>
  <path d="M775 645 C775 665 1392 660 1392 680" class="dash"/>

  <!-- Internet and VPN/Graylog -->
  <rect x="1015" y="405" width="185" height="78" rx="39" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="1107" y="453" text-anchor="middle" class="text" font-weight="800">Internet / WAN</text>
  <path d="M880 458 H1015" class="line" marker-end="url(#arrow)"/>

  <rect x="1240" y="392" width="220" height="118" rx="16" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="1350" y="425" text-anchor="middle" class="text" font-weight="800" fill="#7c3aed">Accès distant</text>
  <text x="1260" y="460" class="small">OpenVPN depuis</text>
  <text x="1260" y="488" class="small">le réseau de l'école</text>
  <path d="M1200 445 H1240" class="dash" marker-end="url(#arrow)"/>

  <rect x="300" y="405" width="270" height="120" rx="16" fill="#f0fdf4" stroke="#16a34a" stroke-width="3"/>
  <text x="435" y="438" text-anchor="middle" class="text" font-weight="800" fill="#15803d">Gestion des logs</text>
  <text x="320" y="472" class="small">Graylog Debian 12</text>
  <text x="320" y="500" class="code">10.20.210.10:9000</text>
  <text x="320" y="525" class="tiny">OPNsense → Syslog UDP 514</text>
  <path d="M670 466 C620 466 620 466 570 466" class="dash" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="35" y="300" width="175" height="250" class="box dark"/>
  <text x="122" y="335" text-anchor="middle" class="text" font-weight="800">Légende</text>
  <path d="M60 375 H100" class="line"/><text x="115" y="382" class="tiny">lien logique</text>
  <path d="M60 415 H100" class="dash"/><text x="115" y="422" class="tiny">trunk 802.1Q</text>
  <text x="60" y="465" class="icon" font-size="28">🧱</text><text x="100" y="465" class="tiny">Pare-feu</text>
  <text x="60" y="505" class="icon" font-size="28">🔁</text><text x="100" y="505" class="tiny">Switch</text>

  <rect x="35" y="585" width="175" height="260" class="box dark"/>
  <text x="122" y="620" text-anchor="middle" class="text" font-weight="800">Règles clés</text>
  <text x="55" y="655" class="tiny">Admin : gestion totale</text>
  <text x="55" y="685" class="tiny">Users : Internet + services</text>
  <text x="55" y="715" class="tiny">WiFi : accès interne contrôlé</text>
  <text x="55" y="745" class="tiny">Invité : Internet uniquement</text>
  <text x="55" y="775" class="tiny">DMZ : LAN interdit</text>
  <text x="55" y="805" class="tiny">WAN → DMZ : 80/443</text>
</svg>